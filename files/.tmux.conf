# .tmux.conf

# ── Prefix key ────────────────────────────────────────────────────────────────
# Remap prefix from C-b to C-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # true color support
set -g history-limit 50000
set -g mouse on                                   # click to switch panes/windows
set -g base-index 1                               # windows start at 1, not 0
set -g pane-base-index 1
set -g renumber-windows on                        # renumber gaps after closing
set -sg escape-time 0                             # no delay after Escape (important for vim)
set -g focus-events on

# ── Key bindings ──────────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes with | and - (and keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window keeping current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with capital HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching
bind -n M-Left  previous-window
bind -n M-Right next-window

# Copy mode (vim keys)
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Colors (works well with dark and light terminals)
set -g status-style                "fg=colour244,bg=default"
set -g window-status-style         "fg=colour244,bg=default"
set -g window-status-current-style "fg=colour255,bg=default,bold"
set -g pane-border-style           "fg=colour238"
set -g pane-active-border-style    "fg=colour75"
set -g message-style               "fg=colour255,bg=default"

# Left: session name
set -g status-left-length 30
set -g status-left " #[bold]#S#[nobold]  "

# Right: host + time
set -g status-right-length 60
set -g status-right "#[fg=colour244]%a %b %d  %H:%M "

# Window list format
set -g window-status-format         " #I:#W "
set -g window-status-current-format " #I:#W "
